name: AI Code Reviewer

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install ts-morph openai typescript tsx --no-save

      - name: Run Smart AI Code Review
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEY_1 }},${{ secrets.GEMINI_API_KEY_2 }},${{ secrets.GEMINI_API_KEY_3 }},${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL_REGISTRY_URL: ${{ secrets.MODEL_REGISTRY_URL }}
        run: |
          if [ -n "$MODEL_REGISTRY_URL" ]; then
            curl -sL "$MODEL_REGISTRY_URL" -o registry.json
            export MODEL_REGISTRY_PATH=registry.json
          fi
          npx tsx .github/scripts/reviewer/demo_review.ts > review_output.txt

      - name: Post PR Comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s review_output.txt ]; then
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              gh pr comment ${{ github.event.pull_request.number }} -F review_output.txt
            else
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
                -F body=@review_output.txt
            fi
          else
            echo "No review output generated or file is empty."
          fi
