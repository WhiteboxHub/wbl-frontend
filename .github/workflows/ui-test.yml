name: UI Grid Regression Tests

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  # ── Job 1: Playwright UI Grid Regression ──────────────────────────────────
  playwright-regression:
    name: Playwright UI Grid Regression
    runs-on: ubuntu-latest
    # Only block PRs — allow pushes to dev to still land (but still report status)
    continue-on-error: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env files for Docker services
        run: |
          # Backend .env — values come from GitHub Secrets
          cat > wbl-backend/.env <<EOF
          DB_HOST=db
          DB_USER=root
          DB_PASSWORD=06022001
          DB_NAME=newschema
          DB_PORT=3306
          EOF

          # Frontend .env — only the public API URL is needed at build time
          cat > wbl-frontend/.env <<EOF
          NEXT_PUBLIC_API_URL=http://backend:8000/api
          NEXTAUTH_URL=http://frontend:3000
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          EOF

      - name: Start full Docker stack and wait for healthy services
        run: |
          docker compose up -d db backend frontend
          echo "Waiting for all services to become healthy..."
          docker compose wait db backend frontend || true
          # Give the frontend an extra 30 s to finish compiling
          sleep 30

      - name: Show service health status
        if: always()
        run: docker compose ps

      - name: Run Playwright Grid Regression
        run: |
          docker compose run \
            -e ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e CANDIDATE_EMAIL="${{ secrets.CANDIDATE_EMAIL }}" \
            -e CANDIDATE_PASSWORD="${{ secrets.CANDIDATE_PASSWORD }}" \
            -e BASE_URL="http://frontend:3000" \
            -e CI="true" \
            --rm playwright
        env:
          COMPOSE_PROFILES: playwright

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: wbl-frontend/playwright-report/
          retention-days: 14

      - name: Upload Test Result XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: wbl-frontend/playwright-report/results.xml
          retention-days: 14

      - name: Tear down Docker stack
        if: always()
        run: docker compose down -v
